<div class="settings-section">
    <h5 class="mb-2">Linked accounts</h5>
    <p class="text-muted small mb-4">Link your account to external services so you can log in here.</p>

    <div class="list-group border-0">
        <div class="list-group-item d-flex justify-content-between align-items-center bg-light mb-2 rounded border">
            <div class="d-flex align-items-center">
                <i class="fab fa-google fa-2x mr-3 text-danger"></i>
                <div>
                    <strong class="d-block">Google</strong>
                    <span class="small text-success">Your account is connected to Google</span>
                </div>
            </div>
            <a href="#" class="btn btn-sm btn-outline-danger">Disconnect</a>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded border">
            <div class="d-flex align-items-center text-muted">
                <i class="fab fa-facebook fa-2x mr-3"></i>
                <strong>Facebook</strong>
            </div>
            <a href="#" class="btn btn-sm btn-primary">Connect Facebook</a>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded border">
            <div class="d-flex align-items-center text-muted">
                <i class="fab fa-twitter fa-2x mr-3"></i>
                <strong>Twitter</strong>
            </div>
            <a href="#" class="btn btn-sm btn-info">Connect Twitter</a>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center mb-2 rounded border">
            <div class="d-flex align-items-center text-muted">
                <i class="fab fa-vk fa-2x mr-3"></i>
                <strong>VK</strong>
            </div>
            <a href="#" class="btn btn-sm btn-dark">Connect VK</a>
        </div>
    </div>
</div>
