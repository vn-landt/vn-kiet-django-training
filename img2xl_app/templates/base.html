<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Extractor AI{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        /* 1. Đảm bảo toàn bộ khung hình luôn chiếm 100% chiều cao */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Sử dụng vh (viewport height) để chính xác hơn */
            padding-top: 70px; /* Chừa chỗ cho navbar fixed-top */
        }

        /* 2. ĐÂY LÀ PHẦN QUAN TRỌNG NHẤT: Thẻ main sẽ giãn ra như lò xo */
        main {
            flex: 1 0 auto;
            display: block; /* Đảm bảo main hiển thị đúng block */
        }

        /* 3. Đảm bảo footer không bị co lại */
        .site-footer {
            flex-shrink: 0;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include "includes/header.html" %}

    <main class="container-fluid py-4">
        {% block content %}
        {% endblock %}
    </main>



    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
