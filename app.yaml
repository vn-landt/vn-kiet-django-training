#application: ai-app-489908
#version: 1
runtime: python27
api_version: 1
threadsafe: yes

handlers:
- url: /static
  static_dir: static
- url: /media
  static_dir: media
- url: /.*
  script: main.application

libraries:
- name: django
  version: "1.11"

env_variables:
  DJANGO_SETTINGS_MODULE: "ai_model_hub.settings"


skip_files:
- ^(.*/)?#.*#$
- ^(.*/)?.*~$
- ^(.*/)?.*\.py[co]$
- ^(.*/)?.*/RCS/.*$
- ^(.*/)?\..*$
- ^\.idea/.*$