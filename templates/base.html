{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Model Hub{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <h1>AI Model Hub</h1>
        <nav>
            <a href="{% url 'models_app:home' %}">Trang chủ</a>
            <a href="{% url 'models_app:aimodel_list' %}">Danh sách Model</a>
            {% if user.is_authenticated %}
                <a href="{% url 'models_app:aimodel_create' %}">Upload Model Mới</a>
                <span>Xin chào, {{ user.username }}!</span>
                <a href="{% url 'models_app:logout' %}">Đăng xuất</a>
            {% else %}
                <a href="{% url 'models_app:login' %}">Đăng nhập</a>
                <a href="{% url 'models_app:register' %}">Đăng ký</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 - Kiệt's AI Model Hub</p>
    </footer>
</body>
</html>
