{% extends 'base.html' %}

{% block title %}Đăng xuất thành công{% endblock %}

{% block content %}
    <div class="container mt-5 text-center">
        <h2 class="text-success">Chúc mừng! Bạn đã đăng xuất thành công.</h2>
        <p class="lead">Cảm ơn bạn đã sử dụng AI Model Hub.</p>

        <div class="mt-4">
            <a href="{% url 'models_app:home' %}" class="btn btn-primary btn-lg mx-2">Trang chủ</a>
            <a href="{% url 'models_app:login' %}" class="btn btn-outline-primary btn-lg mx-2">Đăng nhập</a>
            <a href="{% url 'models_app:register' %}" class="btn btn-outline-success btn-lg mx-2">Đăng ký</a>
        </div>

        <!-- Tự động redirect về trang chủ sau 5 giây (tùy chọn) -->
        <meta http-equiv="refresh" content="5;url={% url 'models_app:home' %}">
        <p class="mt-3 text-muted">Bạn sẽ tự động được chuyển về trang chủ sau 5 giây...</p>
    </div>
{% endblock %}
